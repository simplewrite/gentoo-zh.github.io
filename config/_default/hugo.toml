baseURL = "https://www.gentoo.org.cn/"
title = "Gentoo 中文社区"

defaultContentLanguage = "zh-cn"
defaultContentLanguageInSubdir = false
hasCJKLanguage = true
enableEmoji = true
enableRobotsTXT = true
enableGitInfo = false

# Hextra requires this for its Tailwind asset pipeline output
[build.buildStats]
  enable = true

[[build.cachebusters]]
  source = "assets/.*\\.(js|ts|jsx|tsx)"
  target = "(js|scripts|javascript)"
[[build.cachebusters]]
  source = "(postcss|tailwind)\\.config\\.js"
  target = "css"
[[build.cachebusters]]
  source = "assets/.*\\.(css|scss|sass)"
  target = "(css|styles|scss|sass)"
[[build.cachebusters]]
  source = "data/.*\\.(.*)$"
  target = "data"
[[build.cachebusters]]
  source = "assets/.*\\.(.*)$"
  target = "$1"
[[build.cachebusters]]
  source = "(.*)\\.(.*)$"
  target = "$2"

[module]
  [[module.imports]]
    path = "github.com/Gentoo-zh/gentoozh-theme"

[markup]
  [markup.highlight]
    noClasses = false
    style = "github"
    lineNos = false
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML", "markdown"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[outputFormats.RSS]
  baseName = "feed"

[taxonomies]
  tag = "tags"

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[pagination]
  pagerSize = 50

[imaging]
  anchor = "Center"
