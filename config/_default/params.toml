description = "Gentoo 中文社区 — 中文 Gentoo 用户的交流平台。提供 gentoo-zh Overlay 与社区定制 Live ISO，汇聚新手与资深用户，共同解决安装与使用中的问题。"

enableSearch = true

# 全站日期格式（覆盖 Hextra 默认的 :date_long 英文长日期；与首页 ISO 一致）
dateFormat = "2006-01-02"

# 站点默认社交分享图（Hextra 用于 og:image / twitter:image，绝对化后输出）
images = ["img/og-cover.png"]

[navbar]
  displayTitle = false
  displayLogo = true
  width = "wide"
  [navbar.logo]
    path = "img/logo.webp"
    dark = "img/logo.webp"
    width = 44
    height = 39

[search]
  enable = true
  type = "flexsearch"
  placeholder = "搜索文档..."
  [search.flexsearch]
    index = "content"
    tokenize = "forward"

[theme]
  default = "system"
  displayToggle = true

[footer]
  enable = true
  displayCopyright = true
  displayPoweredBy = true
  width = "normal"

[editURL]
  enable = true
  base = "https://github.com/Gentoo-zh/gentoo-zh.github.io/edit/master/content"

[displayUpdatedDate]
  enable = false

[blog]
  [blog.list]
    sortBy = "date"
    sortOrder = "desc"
    pagerSize = 20
    displayTags = true

[highlight]
  copy = { enable = true, display = "hover" }

[page]
  width = "wide"
  # "Copy as Markdown" / "View as Markdown" 页面菜单（Hextra v0.12，便于 LLM / 终端用户）
  [page.contextMenu]
    enable = true

[toc]
  displayTags = true

[comments]
  enable = false

[gitInfo]
  enable = false
