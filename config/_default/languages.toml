    description = "Gentoo 中文社群——中文 Gentoo 使用者的聚集地。維護 gentoo-zh overlay（中文輸入法、字型等華文支援，及常用網路工具），做開箱即用的社群 Live ISO，彙總下載鏡像與各類資源；裝機用機遇到坑，來這裡一起折騰。"

[en]
  label = "English"
  locale = "en"
  contentDir = "content/en"
  weight = 3
  title = "Gentoo-zh Community"
  [en.params]
    description = "Gentoo-zh Community — where Chinese-speaking Gentoo users hang out. We maintain the gentoo-zh overlay (Chinese input methods, CJK fonts, handy networking tools), build a ready-to-use community Live ISO, and pull together download mirrors and resources. Hit a snag installing or running it? Come tinker with us."
