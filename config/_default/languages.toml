    description = "Gentoo 中文社区——中文 Gentoo 用户的聚集地。维护 gentoo-zh overlay（中文输入法、字体等华文支持，及常用网络工具），做开箱即用的社区 Live ISO，汇总下载镜像与各类资源；装机用机遇到坑，来这儿一起折腾。"

[zh-tw]
