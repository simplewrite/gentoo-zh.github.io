{{ define "main" }}
{{- $isTw := eq .Site.Language.Lang "zh-tw" -}}
{{- $desc := cond $isTw "可能是地址打錯了，或者它已經被移走了。" "可能是地址打错了，或者它已经被移走了。" -}}
<div class="not-prose">
  <section class="error-404">
    <img src="{{ "img/logo.webp" | relURL }}" alt="" class="error-404-mascot" width="96" height="85" />
    <p class="error-404-code">404</p>
    <h1 class="error-404-title">{{ cond $isTw "這個頁面沒找到" "这个页面没找到" }}</h1>
    <p class="error-404-desc">{{ $desc }}</p>
    <div class="error-404-actions">
      <a class="bento-cta" href="{{ relLangURL "" }}">{{ cond $isTw "回首頁" "回首页" }}</a>
      <a class="bento-cta-2" href="{{ relLangURL "posts/" }}">{{ cond $isTw "看文章" "看文章" }}</a>
    </div>
  </section>
</div>
{{ end }}
